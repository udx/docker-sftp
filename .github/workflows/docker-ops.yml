---
name: Docker Operations

"on":
  push:
    paths:
      - ".github/workflows/docker-ops.yml"
      - "Dockerfile"
      - "ci/**"
      - "src/**"
      - LICENSE
  workflow_dispatch:

jobs:
  docker_ops:
    permissions:
      id-token: write
      contents: write
      security-events: write
      actions: read

    uses: udx/reusable-workflows/.github/workflows/docker-ops.yml@master
    with:
      image_name: docker-sftp
      release_branch: latest
      docker_login: ${{ vars.DOCKER_LOGIN }}
      docker_org: ${{ vars.DOCKER_ORG }}
      docker_repo: ${{ vars.DOCKER_REPO }}
      enable_security_upload: ${{ github.repository == 'udx/docker-sftp' }}

    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}
